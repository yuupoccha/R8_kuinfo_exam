        li { margin-bottom: 5px; }
        
        /* 年度リンクのスタイル */

            display: inline-block;
            background-color: #f0f4f8;
            color: #02356E;
            padding: 5px 15px;

            border-radius: 20px;
            font-weight: bold;
            border: 1px solid #02356E;
            transition: 0.3s;
        }
        .year-link:hover {
            background-color: #02356E;
            color: #ffffff;
        }
        
        .back-link { 
            margin-top: 50px; 
            display: block; 
            color: #02356E;
            text-decoration: none;
            font-weight: bold;
        }
