<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B1前期 専門科目 - 過去問ポータル</title>
    <style>
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 0; background-color: #fff; color: #333;
        }
        header { background-color: #02356E; color: #fff; padding: 25px; text-align: center; }
        .container { padding: 30px 20px; }

        /* セレクトボックス（授業選択ロール） */
        .select-wrapper { margin-bottom: 30px; text-align: center; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #02356E; }
        select {
            width: 100%; max-width: 400px; padding: 12px; font-size: 16px;
            border: 2px solid #02356E; border-radius: 8px; color: #02356E; background: #fff;
            cursor: pointer;
        }

        /* 各授業のコンテンツ（初期状態は非表示） */
        .subject-content { display: none; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* カテゴリの見出し */
        .category-section { padding: 20px; border-bottom: 1px solid #eee; }
        .category-section:last-child { border-bottom: none; }
        .category-title { 
            font-size: 1.1em; font-weight: bold; color: #02356E; margin-bottom: 15px; 
            display: flex; align-items: center;
        }
        .category-title::before { content: "●"; margin-right: 8px; font-size: 0.8em; }

        /* リンクのリスト */
        .link-list { list-style: none; padding: 0; display: flex; flex-wrap: wrap; gap: 10px; }
        .link-item {
            background: #f0f4f8; color: #02356E; padding: 8px 16px; border-radius: 20px;
            text-decoration: none; font-size: 0.9em; font-weight: bold; border: 1px solid transparent; transition: 0.2s;
        }
        .link-item:hover { background: #02356E; color: #fff; }

        .back-link { display: block; margin-top: 50px; color: #02356E; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>B1前期 専門科目</h1>
    </header>

    <div class="container">
        <div class="select-wrapper">
            <label for="subject-select">表示する授業を選択してください</label>
            <select id="subject-select" onchange="showSubject()">
                <option value="">-- 授業を選択 --</option>
                <option value="line-algebra">線形代数学I（〇〇教授）</option>
                <option value="calculus">微分積分学I（△△教授）</option>
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 30px;">

        <div id="line-algebra" class="subject-content">
            <div class="category-section">
                <div class="category-title">過去問</div>
                <div class="link-list">
                    <a href="#" class="link-item">2023年度</a>
                    <a href="#" class="link-item">2022年度</a>
                </div>
            </div>
            <div class="category-section">
                <div class="category-title">授業ノート</div>
                <div class="link-list">
                    <a href="#" class="link-item">第1回〜第15回まとめ</a>
                </div>
            </div>
            <div class="category-section">
                <div class="category-title">その他</div>
                <div class="link-list">
                    <a href="#" class="link-item">参考書情報</a>
                </div>
            </div>
        </div>

        <div id="calculus" class="subject-content">
            <div class="category-section">
                <div class="category-title">過去問</div>
                <div class="link-list">
                    <a href="#" class="link-item">2023年度</a>
                </div>
            </div>
            <div class="category-section">
                <div class="category-title">授業ノート</div>
                <div class="link-list">
                    <p style="color: #888; font-size: 0.9em;">現在準備中...</p>
                </div>
            </div>
            <div class="category-section">
                <div class="category-title">その他</div>
                <div class="link-list">
                    <a href="#" class="link-item">公式集(PDF)</a>
                </div>
            </div>
        </div>

        <a href="index.html" class="back-link">← トップページに戻る</a>
    </div>

    <script>
        function showSubject() {
            // すべてのコンテンツを一旦非表示にする
            const contents = document.querySelectorAll('.subject-content');
            contents.forEach(content => content.style.display = 'none');

            // 選択されたIDのコンテンツだけを表示する
            const selectedId = document.getElementById('subject-select').value;
            if (selectedId) {
                document.getElementById(selectedId).style.display = 'block';
            }
        }
    </script>

</body>
</html>
