<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUIR8 - main</title>
    <link rel="icon" href="KUIR8.ico" type="image/x-icon">
    <style>
        /* 全体の設定 */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            line-height: 1.8; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 0; 
            color: #333;
            background-color: #ffffff; /* 白 */
        }
        /* ヘッダー */
        header { 
            background-color: #02356E; /* 藍色 */
            color: #ffffff; /* 白 */
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { margin: 0; font-size: 1.8em; }
        h2 { 
            color: #02356E; 
            border-left: 5px solid #02356E; 
            padding-left: 15px;
            margin-top: 40px;
        }
        /* コンテンツエリア */
        .container { padding: 0 20px 50px 20px; }
        .overview { 
            background: #f0f4f8; 
            padding: 20px; 
            border-radius: 8px;
            border: 1px solid #d0d7de;
        }
        /* ボタン形式のリンク */
        .btn { 
            display: inline-block; 
            background-color: #02356E; 
            color: #ffffff; 
            padding: 15px 30px; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .btn:hover { opacity: 0.8; }
        footer { 
            text-align: center; 
            padding: 20px; 
            font-size: 0.8em; 
            color: #666; 
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>KUIR8</h1>
    </header>

    <div class="container">
        <section class="overview">
            <p>このサイトは、ネットで公開されている京都大学の過去問の中から、<b>情報学科の必修科目のみを抽出</b>し、<b>令和8年度入学者用に整理</b>したサイトです</br>サイト名：KUIR8（クイレートとでも呼んであげてください）</p>
        </section>

        <section>
            <h2>学期別リスト</h2>
            <p>以下のボタンから各学期の科目一覧へ移動できます</p>
            <a href="b1-zenki.html" class="btn">B1前期</a>
        </section>
    </div>
    
</body>
</html>
